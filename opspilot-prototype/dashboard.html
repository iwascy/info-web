<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>总览 · OpsPilot</title>
<link rel="stylesheet" href="assets/app.css">
</head>
<body>
<script src="assets/icons.js"></script>
<script src="assets/data.js"></script>
<script src="assets/app.js"></script>
<script>
renderShell({ active:'dashboard', title:'总览', subtitle:'我的服务现在还活着吗？同步任务进行到哪了？' });

function render() {
  const d = DB.dashboard;
  const services = sortedServices();
  const firing = DB.alerts.filter(a => a.status==='firing');

  const metrics = `
    <div class="grid grid-4 mb-20">
      ${metricCard({ label:'服务总数', value:d.total_services, note:`<span class="t-green">${d.healthy} 正常</span> · <span class="t-blue">${d.running} 运行</span>`, tone:'blue', ico:'server', series:[5,5,6,6,6,6,6,6] })}
      ${metricCard({ label:'正常运行', value:d.healthy, note:`可用率 <span class="t-green tabnum">${d.uptime_pct}%</span>`, tone:'green', ico:'checkCircle', series:DB.sys.cpu.series.map(v=>100-v) })}
      ${metricCard({ label:'异常服务', value:d.error, note:`<span class="t-red">需要立即处理</span>`, tone:'red', ico:'alert', series:[0,0,1,0,0,1,1,1] })}
      ${metricCard({ label:'今日告警', value:d.today_alerts, note:`${firing.length} 条触发中`, tone:'yellow', ico:'bell', series:[1,0,2,1,3,2,3,3] })}
    </div>`;

  // status donut
  const segs = [
    { label:'正常', value:d.healthy, color:'#29d684' },
    { label:'运行中', value:d.running, color:'#3785ff' },
    { label:'异常', value:d.error, color:'#ff5b6f' },
    { label:'未知', value:d.unknown, color:'#94a6c3' },
  ];
  const legend = segs.map(s => `<div class="legend-item"><span class="ld" style="background:${s.color}"></span><span class="lname">${s.label}</span><span class="lval">${s.value}</span></div>`).join('');

  // recent alerts
  const alertFeed = firing.map(a => `
    <a href="alerts.html" class="card card-error hoverable card-pad" style="display:block;text-decoration:none;color:inherit;margin-bottom:12px">
      <div class="row gap-12">
        <span class="sev sev-${a.severity}">${a.severity}</span>
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:14.5px">${a.title}</div>
          <div class="text-muted" style="font-size:12.5px;margin-top:3px">${a.service_key} · ${fmtRelative(a.triggered_at)}</div>
        </div>
        ${icon('chevronRight',18)}
      </div>
    </a>`).join('');

  // system resources
  const sysRow = (name, key, tone, unit) => {
    const s = DB.sys[key];
    return `<div class="row gap-16" style="margin-bottom:16px">
      <div style="width:60px;font-size:13px;color:var(--text-muted)">${name}</div>
      <div style="flex:1">${progressBar(typeof s.value==='number'&&unit==='%'?s.value:s.value*5, tone)}</div>
      <div class="tabnum" style="width:64px;text-align:right;font-weight:700;font-size:14px">${s.value}${unit}</div>
    </div>`;
  };

  // task progress list
  const taskRows = sortedSyncTasks().slice(0,4).map(t => {
    const tone = t.status==='error'?'red':t.status==='success'?'green':'blue';
    return `<a href="sync-detail.html?id=${t.task_id}" style="display:block;text-decoration:none;color:inherit;margin-bottom:16px">
      <div class="row" style="margin-bottom:7px">
        <span style="font-weight:600;font-size:14px">${t.task_name}</span>
        <span class="spacer"></span>
        ${badge(t.status)}
      </div>
      <div class="progress-row">
        ${progressBar(t.progress, tone)}
        <span class="pct t-${tone}">${t.progress}%</span>
      </div>
      <div class="text-muted" style="font-size:12px;margin-top:5px">${t.source} → ${t.target} · ${fmtCompact(t.processed)}/${fmtCompact(t.total)}</div>
    </a>`;
  }).join('');

  // service overview rows
  const svcRows = services.map(s => {
    const tone = statusTone(s.status);
    return `<tr class="${s.status==='error'?'row-error':''}" onclick="location.href='service-detail.html?key=${s.service_key}'" style="cursor:pointer">
      <td><div class="cell-primary">${cellIcon(s.type)}<div><div class="cell-title">${s.name}</div><div class="cell-key">${s.service_key}</div></div></div></td>
      <td>${typeTag(s.type)}</td>
      <td>${badge(s.status)}</td>
      <td style="min-width:160px">${s.progress!=null ? `<div class="progress-row">${progressBar(s.progress, tone)}<span class="pct t-${tone}">${s.progress}%</span></div>` : '<span class="text-dim">—</span>'}</td>
      <td class="text-muted nowrap">${fmtRelative(s.last_heartbeat_at)}</td>
    </tr>`;
  }).join('');

  document.getElementById('content').innerHTML = metrics + `
    <div class="cols-12 mb-20">
      <div class="span-4 card card-pad hoverable">
        <div class="card-head"><h3>服务健康分布</h3></div>
        <div class="row gap-24" style="justify-content:space-between">
          <div class="donut-wrap">
            ${donut(segs)}
            <div class="donut-center"><div class="num">${d.total_services}</div><div class="lbl">服务</div></div>
          </div>
          <div class="legend" style="flex:1">${legend}</div>
        </div>
      </div>

      <div class="span-5 card card-pad hoverable">
        <div class="card-head"><h3>最近告警</h3><span class="spacer"></span><a href="alerts.html" class="btn btn-ghost btn-sm">全部 ${icon('arrowRight',14)}</a></div>
        ${firing.length ? alertFeed : `<div class="empty">${icon('shield',54)}<h4>暂无触发中的告警</h4><p>所有服务运行正常</p></div>`}
      </div>

      <div class="span-3 card card-pad hoverable">
        <div class="card-head"><h3>系统资源</h3></div>
        ${sysRow('CPU','cpu','blue','%')}
        ${sysRow('内存','mem','purple','%')}
        ${sysRow('磁盘','disk','cyan','%')}
        <hr class="divider">
        <div class="row" style="justify-content:space-between">
          <div class="kv"><span class="k">网络吞吐</span><span class="v t-cyan">${DB.sys.net.value} MB/s</span></div>
          <div style="width:90px">${sparkline(DB.sys.net.series, '#17d5eb', 90, 38)}</div>
        </div>
      </div>
    </div>

    <div class="cols-12">
      <div class="span-8 card card-pad hoverable">
        <div class="card-head"><h3>服务列表</h3><span class="sub">异常优先置顶</span><span class="spacer"></span><a href="services.html" class="btn btn-ghost btn-sm">管理服务 ${icon('arrowRight',14)}</a></div>
        <div class="table-wrap"><table class="tbl">
          <thead><tr><th>服务</th><th>类型</th><th>状态</th><th>进度</th><th>最近心跳</th></tr></thead>
          <tbody>${svcRows}</tbody>
        </table></div>
      </div>

      <div class="span-4">
        <div class="card card-pad hoverable mb-20">
          <div class="card-head"><h3>任务进度</h3><span class="spacer"></span><a href="sync.html" class="btn btn-ghost btn-sm">${icon('arrowRight',14)}</a></div>
          ${taskRows}
        </div>
        <div class="card card-pad hoverable">
          <div class="card-head"><h3>快捷操作</h3></div>
          <div class="grid grid-2 gap-12">
            <a href="settings.html" class="btn btn-ghost" style="justify-content:center">${icon('plus',16)} 新增服务</a>
            <a href="api-docs.html" class="btn btn-ghost" style="justify-content:center">${icon('code',16)} 接入文档</a>
            <a href="logs.html" class="btn btn-ghost" style="justify-content:center">${icon('list',16)} 查看日志</a>
            <a href="alerts.html" class="btn btn-ghost" style="justify-content:center">${icon('bell',16)} 告警中心</a>
          </div>
          <hr class="divider">
          <div class="stat-grid">
            <div class="stat-box"><div class="k">今日完成任务</div><div class="v t-purple">${d.today_completed_tasks}</div></div>
            <div class="stat-box"><div class="k">累计同步</div><div class="v t-cyan">${fmtBytes(d.total_synced_bytes)}</div></div>
          </div>
        </div>
      </div>
    </div>`;
}
window.onRefresh = render;
render();
</script>
</body>
</html>
